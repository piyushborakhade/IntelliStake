<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#grad1)" opacity="0.15"/>
  <rect width="200" height="200" rx="40" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

  <!-- Circuit graph lines -->
  <g stroke="url(#grad2)" stroke-width="1.5" opacity="0.4">
    <line x1="40" y1="130" x2="80" y2="100"/>
    <line x1="80" y1="100" x2="120" y2="120"/>
    <line x1="120" y1="120" x2="160" y2="70"/>
    <circle cx="40" cy="130" r="3" fill="#06b6d4"/>
    <circle cx="80" cy="100" r="3" fill="#06b6d4"/>
    <circle cx="120" cy="120" r="3" fill="#06b6d4"/>
    <circle cx="160" cy="70" r="3" fill="#10b981"/>
  </g>

  <!-- "IS" monogram -->
  <!-- I -->
  <rect x="62" y="58" width="10" height="84" rx="5" fill="url(#grad1)" filter="url(#glow)"/>
  <!-- S -->
  <path d="M88 68 Q88 58 100 58 Q112 58 112 68 Q112 78 94 83 Q80 88 80 100 Q80 112 94 115 Q112 115 112 126 Q112 136 100 136 Q88 136 88 126"
        stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Lightning bolt accent -->
  <path d="M108 155 L102 168 L108 168 L100 180 L106 180 L98 196" stroke="#10b981" stroke-width="3" stroke-linecap="round" opacity="0.0"/>

  <!-- Bottom accent line -->
  <rect x="55" y="148" width="90" height="3" rx="2" fill="url(#grad2)" opacity="0.7"/>
</svg>
